<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель Управления — KubanAdventures</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary-dark: #06231A;
      --accent-gold: #C87A2C;
      --accent-gold-hover: #E08B38;
      --light-beige: #F9F6F0;
      --midnight-blue: #0B1D3A;
      --text-dark: #1A2E26;
      --text-light: #F9F6F0;
      --glass-bg: rgba(6, 35, 26, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-display: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
      --transition-smooth: all 0.3s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background-color: var(--primary-dark);
      color: var(--text-light);
      min-height: 100vh;
    }

    /* ФОНОВЫЙ ШУМ */
    .noise-bg { position: relative; }
    .noise-bg::after {
      content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 10;
    }

    /* ХЕДЕР ПАНЕЛИ */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem; font-weight: 700;
      text-decoration: none; color: var(--text-light);
      display: flex; align-items: center; gap: 10px;
    }
    .logo i { color: var(--accent-gold); }

    .header-actions { display: flex; gap: 15px; align-items: center; }
    .btn-outline {
      background: transparent; border: 1px solid var(--glass-border);
      color: var(--text-light); padding: 8px 16px; border-radius: 4px;
      cursor: pointer; transition: var(--transition-smooth); text-decoration: none; font-size: 0.9rem;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    
    .btn-gold {
      background: var(--accent-gold); border: none;
      color: white; padding: 8px 20px; border-radius: 4px;
      cursor: pointer; transition: var(--transition-smooth); text-decoration: none; font-size: 0.9rem; font-weight: 600;
    }
    .btn-gold:hover { background: var(--accent-gold-hover); }

    /* ЗАГЛУШКА АВТОРИЗАЦИИ */
    .auth-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--primary-dark); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition-smooth);
    }
    .auth-card {
      background: var(--light-beige); color: var(--text-dark);
      padding: 40px; border-radius: 8px; width: 100%; max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .auth-card h3 { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 20px; text-align: center; }

    /* ГЛАВНЫЙ МАКЕТ */
    .admin-container {
      display: block; width: 90%; max-width: 1400px; margin: 40px auto;
      display: grid; grid-template-columns: 250px 1fr; gap: 40px;
    }

    /* САЙДБАР С ВКЛАДКАМИ */
    .admin-sidebar {
      background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
      border-radius: 6px; padding: 20px; height: fit-content;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 12px; width: 100%;
      background: transparent; border: none; color: rgba(255,255,255,0.6);
      padding: 12px 15px; border-radius: 4px; cursor: pointer; text-align: left;
      font-size: 0.95rem; font-weight: 600; margin-bottom: 10px; transition: var(--transition-smooth);
    }
    .tab-btn:hover, .tab-btn.active {
      color: white; background: var(--accent-gold);
    }

    /* КОНТЕНТ ВКЛАДОК */
    .admin-tab-content { display: none; }
    .admin-tab-content.active { display: block; }

    .card-block {
      background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
      padding: 30px; border-radius: 8px; margin-bottom: 30px;
    }
    .card-block h3 { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 20px; color: var(--accent-gold); }

    /* ТАБЛИЦЫ */
    .table-container { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; color: var(--text-light); }
    th { padding: 12px 15px; border-bottom: 2px solid var(--glass-border); font-weight: 700; color: var(--accent-gold); }
    td { padding: 12px 15px; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }
    
    /* ФОРМЫ */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px; border: 1px solid var(--glass-border); border-radius: 4px;
      font-family: var(--font-sans); background: rgba(255,255,255,0.05); color: white; transition: var(--transition-smooth);
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--accent-gold); background: rgba(255,255,255,0.08);
    }

    /* БЭДЖИ СТАТУСОВ */
    .status-badge { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 50px; }
    .status-pending { background: #5c4308; color: #ffca28; }
    .status-confirmed { background: #0c4d1d; color: #66bb6a; }
    .status-cancelled { background: #5c1117; color: #ef5350; }

    /* СПИСОК ТУРОВ */
    .tours-list-grid { display: flex; flex-direction: column; gap: 15px; }
    .tour-list-item {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.01); border: 1px solid var(--glass-border);
      padding: 15px 25px; border-radius: 6px;
    }
    .tour-actions { display: flex; gap: 10px; }
    .action-btn {
      border: none; background: transparent; cursor: pointer; font-size: 1.1rem; transition: var(--transition-smooth);
    }
    .action-btn.edit { color: var(--accent-gold); }
    .action-btn.delete { color: #dc3545; }
    .action-btn:hover { transform: scale(1.15); }

    @media (max-width: 768px) {
      .admin-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="noise-bg">

  <!-- ОВЕРЛЕЙ БЕЗОПАСНОСТИ -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <h3>Вход в систему</h3>
      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group" style="margin-bottom: 15px;">
          <label style="color: var(--text-dark);">Email администратора</label>
          <input type="email" id="adminEmail" required placeholder="arsensal06@gmail.com" style="color: var(--text-dark); border-color: rgba(0,0,0,0.15); background: white;">
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <label style="color: var(--text-dark);">Пароль</label>
          <input type="password" id="adminPassword" required placeholder="******" style="color: var(--text-dark); border-color: rgba(0,0,0,0.15); background: white;">
        </div>
        <button type="submit" class="btn-gold" style="width: 100%; padding: 12px;">Войти</button>
      </form>
    </div>
  </div>

  <!-- ШАПКА АДМИНКИ -->
  <header>
    <a href="index.html" class="logo">
      <i class="fa-solid fa-mountain"></i>
      KubanAdventures <span style="font-size: 0.9rem; opacity: 0.5;">Admin Panel</span>
    </a>
    <div class="header-actions">
      <a href="index.html" class="btn-outline"><i class="fa-solid fa-globe"></i> На сайт</a>
      <button class="btn-outline" onclick="handleAdminLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти</button>
    </div>
  </header>

  <!-- КОНТЕЙНЕР ПАНЕЛИ -->
  <div class="admin-container">
    
    <!-- Левая боковая панель переключения -->
    <aside class="admin-sidebar">
      <button class="tab-btn active" id="tab_bookings" onclick="switchTab('bookings')">
        <i class="fa-solid fa-clipboard-list"></i> Заявки клиентов
      </button>
      <button class="tab-btn" id="tab_tours" onclick="switchTab('tours')">
        <i class="fa-solid fa-route"></i> Управление турами
      </button>
      <button class="tab-btn" id="tab_content" onclick="switchTab('content')">
        <i class="fa-solid fa-file-pen"></i> Редактор контента
      </button>
    </aside>

    <!-- Основной блок контента -->
    <main class="admin-main">

      <!-- ВКЛАДКА 1: ЗАЯВКИ КЛИЕНТОВ -->
      <section class="admin-tab-content active" id="content_bookings">
        <div class="card-block">
          <h3>Входящие заявки на туры</h3>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Клиент / Телефон</th>
                  <th>Тур / Стоимость</th>
                  <th>Статус</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="bookingsTableBody">
                <!-- Загружается динамически -->
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- ВКЛАДКА 2: УПРАВЛЕНИЕ ТУРАМИ -->
      <section class="admin-tab-content" id="content_tours">
        <!-- Форма Добавления / Редактирования -->
        <div class="card-block">
          <h3 id="tourFormTitle">Добавить новый экспедиционный тур</h3>
          <form id="tourForm" onsubmit="handleTourSave(event)">
            <input type="hidden" id="editTourId">
            <div class="form-grid">
              <div class="form-group">
                <label>Название тура</label>
                <input type="text" id="tourTitle" required placeholder="Например: Каньон Псахо">
              </div>
              <div class="form-group">
                <label>Регион</label>
                <select id="tourRegion" required>
                  <option value="sochi">Сочи</option>
                  <option value="gelendzhik">Геленджик</option>
                  <option value="anapa">Анапа</option>
                  <option value="novorossiysk">Новороссийск</option>
                  <option value="polyana">Красная Поляна</option>
                  <option value="abrau">Абрау-Дюрсо</option>
                  <option value="lagonaki">Лаго-Наки</option>
                </select>
              </div>
              <div class="form-group">
                <label>Категория</label>
                <select id="tourCategory" required>
                  <option value="jeep">Джип-тур</option>
                  <option value="quad">Квадроциклы</option>
                  <option value="sup">Сап-прогулка</option>
                  <option value="hiking">Хайкинг</option>
                </select>
              </div>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label>Продолжительность</label>
                <input type="text" id="tourDuration" required placeholder="Например: 6 ч">
              </div>
              <div class="form-group">
                <label>Сложность</label>
                <select id="tourDifficulty" required>
                  <option value="Легкая">Легкая</option>
                  <option value="Средняя">Средняя</option>
                  <option value="Высокая">Высокая</option>
                </select>
              </div>
              <div class="form-group">
                <label>Стоимость</label>
                <input type="text" id="tourPrice" required placeholder="Например: 8 500 ₽">
              </div>
            </div>

            <div class="form-group">
              <label>Короткое описание на карточку</label>
              <input type="text" id="tourDesc" required placeholder="Краткая суть поездки">
            </div>

            <div class="form-group">
              <label>Полное детальное описание для модального окна</label>
              <textarea id="tourLongDesc" rows="4" required placeholder="Подробный маршрут, локации, виды..."></textarea>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label>Включено в стоимость (каждая позиция с новой строки)</label>
                <textarea id="tourInclusions" rows="4" required placeholder="Премиум внедорожник&#10;Услуги гида"></textarea>
              </div>
              <div class="form-group">
                <label>Экипировка (каждая позиция с новой строки)</label>
                <textarea id="tourEquipment" rows="4" required placeholder="Кроссовки&#10;Ветровка"></textarea>
              </div>
            </div>

            <div style="display: flex; gap: 15px;">
              <button type="submit" class="btn-gold" id="tourSubmitBtn">Создать тур</button>
              <button type="button" class="btn-outline" onclick="resetTourForm()">Отмена</button>
            </div>
          </form>
        </div>

        <!-- Список существующих туров -->
        <div class="card-block">
          <h3>Зарегистрированные туры</h3>
          <div class="tours-list-grid" id="toursListContainer">
            <!-- Заполняется из JS -->
          </div>
        </div>
      </section>

      <!-- ВКЛАДКА 3: РЕДАКТОР СТАТИЧЕСКИХ ТЕКСТОВ -->
      <section class="admin-tab-content" id="content_content">
        <div class="card-block">
          <h3>Глобальные тексты витрины</h3>
          <form onsubmit="handleContentSave(event)">
            
            <h4 style="color: var(--accent-gold); margin-bottom: 15px;">Главный экран (Hero)</h4>
            <div class="form-grid">
              <div class="form-group">
                <label>Надзаголовок (Subtitle)</label>
                <input type="text" id="cfg_heroSubtitle" required>
              </div>
              <div class="form-group">
                <label>Главный заголовок (Title)</label>
                <input type="text" id="cfg_heroTitle" required>
              </div>
            </div>

            <h4 style="color: var(--accent-gold); margin: 25px 0 15px;">Блок экспертизы (Статистика)</h4>
            <div class="form-grid">
              <div class="form-group">
                <label>Статистика 1: Цифра</label>
                <input type="text" id="cfg_stat1Num" required>
              </div>
              <div class="form-group">
                <label>Статистика 1: Подпись</label>
                <input type="text" id="cfg_stat1Label" required>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label>Статистика 2: Цифра</label>
                <input type="text" id="cfg_stat2Num" required>
              </div>
              <div class="form-group">
                <label>Статистика 2: Подпись</label>
                <input type="text" id="cfg_stat2Label" required>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label>Статистика 3: Цифра</label>
                <input type="text" id="cfg_stat3Num" required>
              </div>
              <div class="form-group">
                <label>Статистика 3: Подпись</label>
                <input type="text" id="cfg_stat3Label" required>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label>Статистика 4: Цифра</label>
                <input type="text" id="cfg_stat4Num" required>
              </div>
              <div class="form-group">
                <label>Статистика 4: Подпись</label>
                <input type="text" id="cfg_stat4Label" required>
              </div>
            </div>

            <h4 style="color: var(--accent-gold); margin: 25px 0 15px;">Футер и контакты агентства</h4>
            <div class="form-group">
              <label>Описание агентства в футере</label>
              <textarea id="cfg_footerDesc" rows="3" required></textarea>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label>Телефон поддержки</label>
                <input type="text" id="cfg_footerPhone" required>
              </div>
              <div class="form-group">
                <label>Электронная почта</label>
                <input type="email" id="cfg_footerEmail" required>
              </div>
              <div class="form-group">
                <label>Официальный адрес</label>
                <input type="text" id="cfg_footerAddress" required>
              </div>
            </div>

            <button type="submit" class="btn-gold" style="margin-top: 15px; padding: 12px 30px;">Сохранить и опубликовать тексты</button>
          </form>
        </div>
      </section>

    </main>
  </div>

  <!-- === JS ЛОГИКА ПАНЕЛИ АДМИНИСТРАТОРА === -->

    /* Инициализация авторизации и данных */
    document.addEventListener("DOMContentLoaded", async () => {
      await loadAdminData();
      initAuthStateListener();
    });

    function initAuthStateListener() {
      if (isFirebaseReady) {
        firebase.auth().onAuthStateChanged((user) => {
          if (user && user.email === ADMIN_EMAIL) {
            grantAccess(user);
          } else {
            lockAccess();
          }
        });
      } else {
        // Проверка автономного режима
        const simUser = localStorage.getItem('kab_sim_user');
        if (simUser) {
          const user = JSON.parse(simUser);
          if (user.email === ADMIN_EMAIL) {
            grantAccess(user);
            return;
          }
        }
        lockAccess();
      }
    }

    function grantAccess(user) {
      currentUser = user;
      document.getElementById('authOverlay').style.display = 'none';
      renderBookings();
      renderToursList();
      fillContentForm();
    }

    function lockAccess() {
      document.getElementById('authOverlay').style.display = 'flex';
      currentUser = null;
    }

    /* Авторизация / Выход */
    function handleAdminLogin(e) {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;

      if (email !== ADMIN_EMAIL) {
        alert("Вход запрещен! Доступ имеет только arsensal06@gmail.com");
        return;
      }

      if (isFirebaseReady) {
        firebase.auth().signInWithEmailAndPassword(email, password)
          .catch(err => alert("Ошибка Firebase: " + err.message));
      } else {
        const simulatedUser = { uid: "u_sim_admin", email: email, displayName: "Глава Агентства" };
        localStorage.setItem('kab_sim_user', JSON.stringify(simulatedUser));
        grantAccess(simulatedUser);
      }
    }

    function handleAdminLogout() {
      if (isFirebaseReady) {
        firebase.auth().signOut().then(() => location.reload());
      } else {
        localStorage.removeItem('kab_sim_user');
        location.reload();
      }
    }

    /* Загрузка данных */
    async function loadAdminData() {
      if (isFirebaseReady) {
        try {
          const db = firebase.firestore();
          const doc = await db.collection("site_config").doc("main").get();
          if (doc.exists) {
            const data = doc.data();
            if (data.tours) TOURS = data.tours;
            if (data.settings) SITE_SETTINGS = data.settings;
          }
        } catch (e) {
          console.warn("Ошибка Firebase, загрузка из локального хранилища.", e);
        }
      }

      const localTours = localStorage.getItem('kab_dynamic_tours');
      const localSettings = localStorage.getItem('kab_dynamic_settings');
      if (localTours) TOURS = JSON.parse(localTours);
      if (localSettings) SITE_SETTINGS = JSON.parse(localSettings);
    }

    /* Сохранение изменений в БД и кэш */
    async function publishData() {
      localStorage.setItem('kab_dynamic_tours', JSON.stringify(TOURS));
      localStorage.setItem('kab_dynamic_settings', JSON.stringify(SITE_SETTINGS));

      if (isFirebaseReady) {
        try {
          const db = firebase.firestore();
          await db.collection("site_config").doc("main").set({
            tours: TOURS,
            settings: SITE_SETTINGS
          });
          alert("Данные успешно сохранены и синхронизированы с базой!");
        } catch (e) {
          alert("Ошибка при записи в Firebase, изменения сохранены локально.");
        }
      } else {
        alert("Изменения успешно применены локально!");
      }
    }

    /* Переключение разделов (вкладок) */
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.admin-tab-content').forEach(cont => cont.classList.remove('active'));

      document.getElementById('tab_' + tabId).classList.add('active');
      document.getElementById('content_' + tabId).classList.add('active');
    }

    /* ВКЛАДКА 1: ЗАЯВКИ КЛИЕНТОВ */
    function renderBookings() {
      const tbody = document.getElementById('bookingsTableBody');
      tbody.innerHTML = '';

      let bookings = JSON.parse(localStorage.getItem('kab_bookings') || '[]');

      if (isFirebaseReady) {
        const db = firebase.firestore();
        db.collection("bookings").get().then((snap) => {
          let fbBookings = [];
          snap.forEach(doc => fbBookings.push(doc.data()));
          if (fbBookings.length > 0) renderTableRows(fbBookings);
          else renderTableRows(bookings);
        }).catch(() => renderTableRows(bookings));
      } else {
        renderTableRows(bookings);
      }
    }

    function renderTableRows(bookingsList) {
      const tbody = document.getElementById('bookingsTableBody');
      tbody.innerHTML = '';

      if (bookingsList.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; opacity: 0.5; padding: 30px;">Новых заявок пока нет.</td></tr>`;
        return;
      }

      bookingsList.sort((a,b) => b.id > a.id ? 1 : -1).forEach(b => {
        let stClass = 'status-pending';
        let stText = 'Ожидает';
        if (b.status === 'confirmed') { stClass = 'status-confirmed'; stText = 'Одобрен'; }
        if (b.status === 'cancelled') { stClass = 'status-cancelled'; stText = 'Отменен'; }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${b.date || '—'}</td>
          <td><strong>${b.userName}</strong><br><span style="opacity:0.6;">${b.userPhone}</span></td>
          <td><strong>${b.tourTitle}</strong><br><span style="color:var(--accent-gold);">${b.tourPrice}</span></td>
          <td><span class="status-badge ${stClass}">${stText}</span></td>
          <td>
            <button class="action-btn" onclick="changeBookingStatus('${b.id}', 'confirmed')" style="color: #28a745; margin-right: 10px;"><i class="fa-solid fa-check"></i></button>
            <button class="action-btn" onclick="changeBookingStatus('${b.id}', 'cancelled')" style="color: #dc3545;"><i class="fa-solid fa-xmark"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function changeBookingStatus(id, status) {
      if (isFirebaseReady) {
        const db = firebase.firestore();
        db.collection("bookings").doc(id).update({ status: status })
          .then(() => renderBookings())
          .catch(() => updateLocalBookingStatus(id, status));
      } else {
        updateLocalBookingStatus(id, status);
      }
    }

    function updateLocalBookingStatus(id, status) {
      let bks = JSON.parse(localStorage.getItem('kab_bookings') || '[]');
      let updated = bks.map(b => {
        if (b.id === id) b.status = status;
        return b;
      });
      localStorage.setItem('kab_bookings', JSON.stringify(updated));
      renderBookings();
    }

    /* ВКЛАДКА 2: РЕАКТИВНЫЙ РЕДАКТОР ТУРОВ */
    function renderToursList() {
      const container = document.getElementById('toursListContainer');
      container.innerHTML = '';

      TOURS.forEach(t => {
        const div = document.createElement('div');
        div.className = 'tour-list-item';
        div.innerHTML = `
          <div>
            <strong style="font-size: 1.1rem; color: white;">${t.title}</strong><br>
            <span style="font-size: 0.8rem; opacity: 0.6; text-transform: uppercase;">${t.regionId} • ${t.category} • ${t.price}</span>
          </div>
          <div class="tour-actions">
            <button class="action-btn edit" onclick="editTour(${t.id})" title="Редактировать"><i class="fa-solid fa-pen-to-square"></i></button>
            <button class="action-btn delete" onclick="deleteTour(${t.id})" title="Удалить"><i class="fa-solid fa-trash-can"></i></button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function editTour(id) {
      const t = TOURS.find(item => item.id === id);
      if (!t) return;

      document.getElementById('editTourId').value = t.id;
      document.getElementById('tourTitle').value = t.title;
      document.getElementById('tourRegion').value = t.regionId;
      document.getElementById('tourCategory').value = t.category;
      document.getElementById('tourDuration').value = t.duration;
      document.getElementById('tourDifficulty').value = t.difficulty;
      document.getElementById('tourPrice').value = t.price;
      document.getElementById('tourDesc').value = t.desc;
      document.getElementById('tourLongDesc').value = t.longDesc;
      document.getElementById('tourInclusions').value = Array.isArray(t.inclusions) ? t.inclusions.join('\n') : '';
      document.getElementById('tourEquipment').value = Array.isArray(t.equipment) ? t.equipment.join('\n') : '';

      document.getElementById('tourFormTitle').textContent = `Редактировать тур: ${t.title}`;
      document.getElementById('tourSubmitBtn').textContent = "Сохранить изменения";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteTour(id) {
      if (confirm("Вы действительно хотите удалить данный тур?")) {
        TOURS = TOURS.filter(t => t.id !== id);
        publishData();
        renderToursList();
      }
    }

    function resetTourForm() {
      document.getElementById('tourForm').reset();
      document.getElementById('editTourId').value = '';
      document.getElementById('tourFormTitle').textContent = "Добавить новый экспедиционный тур";
      document.getElementById('tourSubmitBtn').textContent = "Создать тур";
    }

    function handleTourSave(e) {
      e.preventDefault();

      const id = document.getElementById('editTourId').value;
      const title = document.getElementById('tourTitle').value;
      const region = document.getElementById('tourRegion').value;
      const category = document.getElementById('tourCategory').value;
      const duration = document.getElementById('tourDuration').value;
      const difficulty = document.getElementById('tourDifficulty').value;
      const price = document.getElementById('tourPrice').value;
      const desc = document.getElementById('tourDesc').value;
      const longDesc = document.getElementById('tourLongDesc').value;
      const inclusions = document.getElementById('tourInclusions').value.split('\n').filter(i => i.trim() !== '');
      const equipment = document.getElementById('tourEquipment').value.split('\n').filter(i => i.trim() !== '');

      const tourPayload = {
        id: id ? parseInt(id) : Date.now(),
        regionId: region,
        category: category,
        title: title,
        duration: duration,
        difficulty: difficulty,
        price: price,
        desc: desc,
        longDesc: longDesc,
        inclusions: inclusions,
        equipment: equipment
      };

      if (id) {
        // Режим обновления
        TOURS = TOURS.map(t => t.id === parseInt(id) ? tourPayload : t);
      } else {
        // Режим добавления
        TOURS.push(tourPayload);
      }

      publishData();
      renderToursList();
      resetTourForm();
    }

    /* ВКЛАДКА 3: РЕДАКТОР СТАТИЧЕСКОГО КОНТЕНТА */
    function fillContentForm() {
      document.getElementById('cfg_heroSubtitle').value = SITE_SETTINGS.heroSubtitle;
      document.getElementById('cfg_heroTitle').value = SITE_SETTINGS.heroTitle;
      
      document.getElementById('cfg_stat1Num').value = SITE_SETTINGS.stat1Num;
      document.getElementById('cfg_stat1Label').value = SITE_SETTINGS.stat1Label;
      
      document.getElementById('cfg_stat2Num').value = SITE_SETTINGS.stat2Num;
      document.getElementById('cfg_stat2Label').value = SITE_SETTINGS.stat2Label;
      
      document.getElementById('cfg_stat3Num').value = SITE_SETTINGS.stat3Num;
      document.getElementById('cfg_stat3Label').value = SITE_SETTINGS.stat3Label;
      
      document.getElementById('cfg_stat4Num').value = SITE_SETTINGS.stat4Num;
      document.getElementById('cfg_stat4Label').value = SITE_SETTINGS.stat4Label;
      
      document.getElementById('cfg_footerDesc').value = SITE_SETTINGS.footerDesc;
      document.getElementById('cfg_footerPhone').value = SITE_SETTINGS.footerPhone;
      document.getElementById('cfg_footerEmail').value = SITE_SETTINGS.footerEmail;
      document.getElementById('cfg_footerAddress').value = SITE_SETTINGS.footerAddress;
    }

    function handleContentSave(e) {
      e.preventDefault();

      SITE_SETTINGS.heroSubtitle = document.getElementById('cfg_heroSubtitle').value;
      SITE_SETTINGS.heroTitle = document.getElementById('cfg_heroTitle').value;
      
      SITE_SETTINGS.stat1Num = document.getElementById('cfg_stat1Num').value;
      SITE_SETTINGS.stat1Label = document.getElementById('cfg_stat1Label').value;
      
      SITE_SETTINGS.stat2Num = document.getElementById('cfg_stat2Num').value;
      SITE_SETTINGS.stat2Label = document.getElementById('cfg_stat2Label').value;
      
      SITE_SETTINGS.stat3Num = document.getElementById('cfg_stat3Num').value;
      SITE_SETTINGS.stat3Label = document.getElementById('cfg_stat3Label').value;
      
      SITE_SETTINGS.stat4Num = document.getElementById('cfg_stat4Num').value;
      SITE_SETTINGS.stat4Label = document.getElementById('cfg_stat4Label').value;
      
      SITE_SETTINGS.footerDesc = document.getElementById('cfg_footerDesc').value;
      SITE_SETTINGS.footerPhone = document.getElementById('cfg_footerPhone').value;
      SITE_SETTINGS.footerEmail = document.getElementById('cfg_footerEmail').value;
      SITE_SETTINGS.footerAddress = document.getElementById('cfg_footerAddress').value;

      publishData();
    }
  </script>
</body>
